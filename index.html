<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markfolio</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f7f7f5;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    background: white;
    border-bottom: 1px solid #e0e0e0;
    flex-shrink: 0;
  }

  .title-input {
    flex: 1;
    font-size: 18px;
    font-weight: 600;
    border: none;
    outline: none;
    background: transparent;
    color: #37352f;
  }
  .title-input::placeholder { color: #ccc; }

  .export-btn {
    padding: 8px 18px;
    background: #2eaadc;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.15s;
  }
  .export-btn:hover { background: #1a90c0; }

  .docs-link {
    padding: 8px 18px;
    font-size: 14px;
    font-weight: 500;
    color: #2eaadc;
    text-decoration: none;
    border: 1.5px solid #2eaadc;
    border-radius: 6px;
    transition: background 0.15s, color 0.15s;
  }
  .docs-link:hover { background: #2eaadc; color: white; }

  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  .editor-pane,
  .preview-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .editor-pane { border-right: 1px solid #e0e0e0; }

  /* Drag-over highlight */
  .editor-pane.drag-over textarea {
    background: #f0f8ff;
  }

  .pane-label {
    padding: 6px 16px;
    font-size: 11px;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    background: #fafafa;
    border-bottom: 1px solid #eee;
    flex-shrink: 0;
  }

  textarea {
    flex: 1;
    width: 100%;
    padding: 24px;
    font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.7;
    border: none;
    outline: none;
    resize: none;
    background: white;
    color: #37352f;
    transition: background 0.15s;
  }

  .preview-content {
    flex: 1;
    padding: 24px 32px;
    overflow-y: auto;
    background: white;
    color: #37352f;
    line-height: 1.75;
    font-size: 15px;
  }

  /* Markdown preview styles */
  .preview-content h1 { font-size: 2em; margin: 0 0 16px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
  .preview-content h2 { font-size: 1.5em; margin: 24px 0 10px; }
  .preview-content h3 { font-size: 1.2em; margin: 18px 0 8px; }
  .preview-content p { margin-bottom: 14px; }
  .preview-content img { max-width: 100%; border-radius: 6px; margin: 8px 0; display: block; }
  .preview-content code { background: #f0f0ee; padding: 2px 6px; border-radius: 3px; font-family: 'Monaco', monospace; font-size: 13px; }
  .preview-content pre { background: #f0f0ee; padding: 16px; border-radius: 6px; overflow-x: auto; margin-bottom: 14px; }
  .preview-content pre code { background: none; padding: 0; }
  .preview-content blockquote { border-left: 4px solid #ddd; padding-left: 16px; color: #777; margin: 12px 0; }
  .preview-content ul, .preview-content ol { padding-left: 24px; margin-bottom: 14px; }
  .preview-content li { margin-bottom: 4px; }
  .preview-content a { color: #2eaadc; text-decoration: none; }
  .preview-content a:hover { text-decoration: underline; }
  .preview-content hr { border: none; border-top: 1px solid #eee; margin: 20px 0; }
  .preview-content table { border-collapse: collapse; width: 100%; margin-bottom: 14px; }
  .preview-content th, .preview-content td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
  .preview-content th { background: #f7f7f5; }

  .status {
    display: flex;
    justify-content: space-between;
    padding: 5px 20px;
    font-size: 12px;
    color: #999;
    background: white;
    border-top: 1px solid #eee;
    flex-shrink: 0;
  }

  /* Sidebar */
  .sidebar {
    width: 220px;
    background: #fafafa;
    border-right: 1px solid #e0e0e0;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border-bottom: 1px solid #eee;
    flex-shrink: 0;
  }

  .sidebar-header span {
    font-size: 11px;
    font-weight: 600;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }

  .new-note-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #2eaadc;
    font-size: 22px;
    line-height: 1;
    padding: 0;
  }
  .new-note-btn:hover { color: #1a90c0; }

  .note-list {
    flex: 1;
    overflow-y: auto;
  }

  .note-item {
    display: flex;
    align-items: center;
    padding: 9px 12px;
    cursor: pointer;
    border-bottom: 1px solid #f0f0f0;
    gap: 6px;
  }
  .note-item:hover { background: #f0f0ee; }
  .note-item.active { background: #e8f4fc; }

  .note-item-title {
    flex: 1;
    font-size: 13px;
    color: #37352f;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .note-item.active .note-item-title { font-weight: 600; }

  .delete-note-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #ccc;
    font-size: 16px;
    padding: 0 2px;
    flex-shrink: 0;
    opacity: 0;
    line-height: 1;
  }
  .note-item:hover .delete-note-btn { opacity: 1; }
  .delete-note-btn:hover { color: #e53e3e; }
</style>
</head>
<body>

<div class="toolbar">
  <input class="title-input" type="text" placeholder="Untitled" id="title" value="Untitled" />
  <button class="export-btn" onclick="exportZip()">⬇ Export</button>
  <a class="docs-link" href="docs.html">Docs</a>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <span>Notes</span>
      <button class="new-note-btn" id="newNoteBtn" title="New note">+</button>
    </div>
    <div class="note-list" id="noteList"></div>
  </div>
  <div class="editor-pane" id="editorPane">
    <div class="pane-label">Markdown</div>
    <textarea id="editor" placeholder="Start writing...&#10;&#10;Paste or drop images here (Ctrl+V / Cmd+V)&#10;Use markdown: **bold**, _italic_, ## headings"></textarea>
  </div>
  <div class="preview-pane">
    <div class="pane-label">Preview</div>
    <div class="preview-content" id="preview"></div>
  </div>
</div>

<div class="status">
  <span id="statusMsg">Ready</span>
  <span id="wordCount">0 words · 0 chars</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="imageStore.js"></script>
<script src="app.js?v=3"></script>
</body>
</html>
